# ═══════════════════════════════════════════════════════════════
#  CineWax — application.properties
# ═══════════════════════════════════════════════════════════════
#  Cuando corre dentro de Docker (compose), las variables de
#  entorno SPRING_DATASOURCE_* del compose.yml sobreescriben
#  estos valores automáticamente.
#
#  Cuando corre en local (IDE), usa los valores de abajo.
# ═══════════════════════════════════════════════════════════════
spring.application.name=CineWax

# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL datasource ───────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/cinewax
spring.datasource.username=cinewax_user
spring.datasource.password=cinewax_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evitar error de lazy loading en serialización JSON
spring.jpa.open-in-view=true

# ─── Jackson (serialización JSON) ───────────────────────────
# Formato legible para fechas y horas en las respuestas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Mexico_City

# ─── Sesión HTTP ────────────────────────────────────────────
# Timeout de sesión: 30 minutos
server.servlet.session.timeout=30m

# ─── Logging ────────────────────────────────────────────────
logging.level.com.waxeados.CineWax=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE